name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .
      - name: Type-check
        run: mypy rphantom

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        # Fixtures are committed, so the suite runs fully offline and deterministically.
        run: python -m pytest -q

  reference-fixtures:
    name: IBSI fixtures are reproducible from source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Regenerate, format, and diff the IBSI reference fixture
        # The committed fixture is ruff-formatted; the generator emits compact
        # source, so format before diffing to compare data, not layout.
        run: |
          python scripts/fetch_ibsi_reference.py
          ruff format tests/ibsi_reference.py
          git diff --exit-code tests/ibsi_reference.py \
            || (echo "::error::tests/ibsi_reference.py is out of sync with the IBSI source" && exit 1)
